name: compose-validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Bash syntax check
        run: bash -n bin/domum-media bin/domum-media-backup install.sh

      - name: shellcheck
        # Fail on real warnings/errors; info-level notes (e.g. sourcing
        # /etc/os-release, intentional subshell-scoped exports) are advisory.
        run: shellcheck --severity=warning bin/domum-media bin/domum-media-backup install.sh

      - name: Immich secret propagation smoke test
        run: tests/immich-secret-propagation-smoke.sh

      - name: docker compose config (every fragment layered on base)
        run: |
          set -euo pipefail
          args=(-f compose/base.yml)
          while IFS= read -r f; do
            args+=(-f "$f")
          done < <(find compose -name '*.yml' -not -path 'compose/base.yml' -not -path '*/traefik/*' | sort)
          echo "Running: docker compose --env-file config/ci.env ${args[*]} config -q"
          docker compose --env-file config/ci.env "${args[@]}" config -q
