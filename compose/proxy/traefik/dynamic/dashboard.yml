http:
  routers:
    traefik-dashboard:
      rule: 'Host(`{{ env "TRAEFIK_DASHBOARD_HOST" }}`)'      
      entryPoints:
        - websecure
      service: api@internal
      middlewares:
        - traefik-auth
        - securityHeaders
      tls:
        certResolver: cf

  middlewares:
    traefik-auth:
      basicAuth:
        usersFile: /run/secrets/traefik_dashboard_users
