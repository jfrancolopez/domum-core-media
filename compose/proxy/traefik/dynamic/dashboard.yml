http:
  routers:
    traefik-dashboard:
      rule: "Host(`traefik.ladomum.com`)"
      entryPoints:
        - websecure
      service: api@internal
      middlewares:
        - traefik-auth
        - securityHeaders
      tls:
        certResolver: cf

  middlewares:
    traefik-auth:
      basicAuth:
        # Generate with: htpasswd -nB admin > /etc/domum-core-media/secrets/traefik_dashboard_users
        # Then bind-mount that file into the traefik container and switch this
        # block to `usersFile: /etc/traefik/usersfile`.
        users:
          - "admin:$$apr1$$placeholder$$replaceme"
