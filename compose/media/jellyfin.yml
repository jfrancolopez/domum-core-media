services:
  jellyfin:
    image: ${JELLYFIN_IMAGE}
    container_name: jellyfin
    restart: unless-stopped
    networks:
      - domum-proxy
      - domum-internal
    volumes:
      - ${JELLYFIN_CONFIG_DIR:?JELLYFIN_CONFIG_DIR is required}:/config
      - ${JELLYFIN_CACHE_DIR:?JELLYFIN_CACHE_DIR is required}:/cache
      - ${JELLYFIN_MEDIA_ROOT:?JELLYFIN_MEDIA_ROOT is required}:/media:ro
    environment:
      JELLYFIN_PublishedServerUrl: https://${JELLYFIN_HOST}
    labels:
      - traefik.enable=true
      - traefik.docker.network=domum-proxy
      - traefik.http.routers.jellyfin.rule=Host(`${JELLYFIN_HOST}`)
      - traefik.http.routers.jellyfin.entrypoints=websecure
      - traefik.http.routers.jellyfin.tls=true
      - traefik.http.routers.jellyfin.tls.certresolver=cf
      - traefik.http.routers.jellyfin.middlewares=securityHeaders@file
      - traefik.http.services.jellyfin.loadbalancer.server.port=8096

networks:
  domum-proxy:
    external: true
  domum-internal:
    external: true
