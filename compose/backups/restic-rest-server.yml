services:
  # OPTIONAL: append-only REST server for restic, in case the NAS is hosted on
  # this same box. Default off. If you enable it, point your restic_nas_env
  # at  RESTIC_REPOSITORY=rest:http://restic-rest-server:8000/<user>/  and
  # configure --append-only via REST_SERVER_FLAGS below.
  restic-rest-server:
    image: restic/rest-server:latest
    container_name: restic-rest-server
    restart: unless-stopped
    networks:
      - domum-internal
    environment:
      OPTIONS: "--append-only --no-auth"
    volumes:
      - restic-rest-data:/data

networks:
  domum-internal:
    external: true

volumes:
  restic-rest-data:
