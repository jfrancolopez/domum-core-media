services:
  uptime-kuma:
    image: ${UPTIME_KUMA_IMAGE}
    container_name: uptime-kuma
    restart: unless-stopped
    networks:
      - domum-proxy
    volumes:
      - uptime-kuma-data:/app/data
    labels:
      - traefik.enable=true
      - traefik.docker.network=domum-proxy
      - traefik.http.routers.status.rule=Host(`status-media.${DOMUM_DOMAIN}`)
      - traefik.http.routers.status.entrypoints=websecure
      - traefik.http.routers.status.tls=true
      - traefik.http.routers.status.tls.certresolver=cf
      - traefik.http.services.status.loadbalancer.server.port=3001
      - traefik.http.routers.status.middlewares=securityHeaders@file

networks:
  domum-proxy:
    external: true

volumes:
  uptime-kuma-data:
